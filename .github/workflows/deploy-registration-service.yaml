name: Deploy Registration Service Blue-Green

on:
  push:
    branches: [main]
    paths:
      - 'microservices/registration-service/**'
  workflow_dispatch:
  workflow_call:

env:
  REGISTRY: ghcr.io
  SERVICE_NAME: registration-service

jobs:
  build-and-deploy:
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Log in to GHCR
      uses: docker/login-action@v2
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GHCR_TOKEN }}

    - name: Build and push Docker image
      run: |
        cd microservices/registration-service
        docker build -t ${{ env.REGISTRY }}/hewawasamdm/${{ env.SERVICE_NAME }}:${{ github.sha }} .
        docker tag ${{ env.REGISTRY }}/hewawasamdm/${{ env.SERVICE_NAME }}:${{ github.sha }} ${{ env.REGISTRY }}/hewawasamdm/${{ env.SERVICE_NAME }}:latest
        docker push ${{ env.REGISTRY }}/hewawasamdm/${{ env.SERVICE_NAME }}:${{ github.sha }}
        docker push ${{ env.REGISTRY }}/hewawasamdm/${{ env.SERVICE_NAME }}:latest
        docker rmi ${{ env.REGISTRY }}/hewawasamdm/${{ env.SERVICE_NAME }}:${{ github.sha }} ${{ env.REGISTRY }}/hewawasamdm/${{ env.SERVICE_NAME }}:latest

    - name: Deploy Blue-Green
      run: |
        CURRENT=$(kubectl get deployment registration-service -o jsonpath='{.metadata.labels.color}' 2>/dev/null || echo "blue")
        [ "$CURRENT" == "blue" ] && IDLE="green" || IDLE="blue"
        
        cat << EOF > /tmp/registration-service-${IDLE}.yaml
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: registration-service-${IDLE}
          labels:
            app: registration-service
            color: ${IDLE}
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: registration-service
              color: ${IDLE}
          template:
            metadata:
              labels:
                app: registration-service
                color: ${IDLE}
            spec:
              containers:
              - name: registration-service
                image: ${{ env.REGISTRY }}/hewawasamdm/registration-service:${{ github.sha }}
                ports:
                - containerPort: 8080
                env:
                - name: DB_HOST
                  value: "cw-event-db.cpua0oyyqtqw.eu-west-1.rds.amazonaws.com"
                - name: DB_PORT
                  value: "5432"
                - name: DB_NAME
                  value: "postgres"
                - name: DB_USER
                  value: "cwadmin"
                - name: DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: db-credentials
                      key: password
                resources:
                  requests:
                    memory: "64Mi"
                    cpu: "50m"
                  limits:
                    memory: "128Mi"
                    cpu: "100m"
                readinessProbe:
                  httpGet:
                    path: /healthz
                    port: 8080
                  initialDelaySeconds: 10
                  periodSeconds: 5
        EOF
        
        kubectl apply -f /tmp/registration-service-${IDLE}.yaml
        kubectl rollout status deployment/registration-service-${IDLE} --timeout=120s
        
        sleep 10
        kubectl patch service registration-service -p "{\"spec\":{\"selector\":{\"app\":\"registration-service\",\"color\":\"${IDLE}\"}}}" 2>/dev/null || \
        kubectl expose deployment registration-service-${IDLE} --name=registration-service --port=80 --target-port=8080
        
        kubectl scale deployment registration-service-${CURRENT} --replicas=0 2>/dev/null
        echo "Registration service deployed to $IDLE"
