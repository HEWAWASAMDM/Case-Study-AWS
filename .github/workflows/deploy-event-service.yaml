name: Deploy Event Service Blue-Green

on:
  push:
    branches: [main]
    paths:
      - 'microservices/event-service/**'
  workflow_dispatch:
  workflow_call:

env:
  REGISTRY: ghcr.io
  SERVICE_NAME: event-service

jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Log in to GHCR
      uses: docker/login-action@v2
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GHCR_TOKEN }}

    - name: Build and push Docker image
      run: |
        cd microservices/event-service
        docker build -t ${{ env.REGISTRY }}/hewawasamdm/${{ env.SERVICE_NAME }}:${{ github.sha }} .
        docker tag ${{ env.REGISTRY }}/hewawasamdm/${{ env.SERVICE_NAME }}:${{ github.sha }} ${{ env.REGISTRY }}/hewawasamdm/${{ env.SERVICE_NAME }}:latest
        docker push ${{ env.REGISTRY }}/hewawasamdm/${{ env.SERVICE_NAME }}:${{ github.sha }}
        docker push ${{ env.REGISTRY }}/hewawasamdm/${{ env.SERVICE_NAME }}:latest
        docker rmi ${{ env.REGISTRY }}/hewawasamdm/${{ env.SERVICE_NAME }}:${{ github.sha }} ${{ env.REGISTRY }}/hewawasamdm/${{ env.SERVICE_NAME }}:latest

    - name: Determine current color
      id: colors
      run: |
        CURRENT=$(kubectl get service event-service -o jsonpath='{.spec.selector.color}' 2>/dev/null || echo "blue")
        if [ "$CURRENT" == "blue" ]; then
          echo "idle=green" >> $GITHUB_OUTPUT
          echo "current=blue" >> $GITHUB_OUTPUT
        else
          echo "idle=blue" >> $GITHUB_OUTPUT
          echo "current=green" >> $GITHUB_OUTPUT
        fi

    - name: Deploy to idle environment
      run: |
        IDLE_COLOR="${{ steps.colors.outputs.idle }}"
        cat << DEPLOYMENT_EOF > /tmp/event-service-${IDLE_COLOR}.yaml
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: event-service-${IDLE_COLOR}
          labels:
            app: event-service
            color: ${IDLE_COLOR}
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: event-service
              color: ${IDLE_COLOR}
          template:
            metadata:
              labels:
                app: event-service
                color: ${IDLE_COLOR}
            spec:
              containers:
              - name: event-service
                image: ${{ env.REGISTRY }}/hewawasamdm/event-service:${{ github.sha }}
                ports:
                - containerPort: 8001
                env:
                - name: DB_HOST
                  value: "cw-event-db.cpua0oyyqtqw.eu-west-1.rds.amazonaws.com"
                - name: DB_PORT
                  value: "5432"
                - name: DB_NAME
                  value: "postgres"
                - name: DB_USER
                  value: "cwadmin"
                - name: DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: db-credentials
                      key: password
                resources:
                  requests:
                    memory: "64Mi"
                    cpu: "50m"
                  limits:
                    memory: "128Mi"
                    cpu: "100m"
                readinessProbe:
                  httpGet:
                    path: /healthz
                    port: 8001
                  initialDelaySeconds: 10
                  periodSeconds: 5
        DEPLOYMENT_EOF
        kubectl apply -f /tmp/event-service-${IDLE_COLOR}.yaml
        kubectl rollout status deployment/event-service-${IDLE_COLOR} --timeout=120s

    - name: Health check
      run: |
        IDLE_COLOR="${{ steps.colors.outputs.idle }}"
        POD_IP=$(kubectl get pods -l app=event-service,color=${IDLE_COLOR} -o jsonpath='{.items[0].status.podIP}')
        for i in {1..10}; do
          if curl -s http://${POD_IP}:8001/healthz | grep -q "healthy"; then
            echo "Health check passed"
            exit 0
          fi
          sleep 5
        done
        echo "Health check failed"
        exit 1

    - name: Switch traffic
      run: |
        IDLE_COLOR="${{ steps.colors.outputs.idle }}"
        CURRENT_COLOR="${{ steps.colors.outputs.current }}"
        kubectl patch service event-service -p "{\"spec\":{\"selector\":{\"app\":\"event-service\",\"color\":\"$IDLE_COLOR\"}}}"
        echo "Traffic switched to $IDLE_COLOR"
        kubectl scale deployment event-service-${CURRENT_COLOR} --replicas=0 2>/dev/null || true
