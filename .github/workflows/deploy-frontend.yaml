name: Deploy Frontend Blue-Green

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
  workflow_dispatch:
  workflow_call:

env:
  REGISTRY: ghcr.io
  SERVICE_NAME: frontend

jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Log in to GHCR
      uses: docker/login-action@v2
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GHCR_TOKEN }}

    - name: Build and push Docker image
      run: |
        cd frontend
        docker build -t ${{ env.REGISTRY }}/hewawasamdm/${{ env.SERVICE_NAME }}:${{ github.sha }} .
        docker tag ${{ env.REGISTRY }}/hewawasamdm/${{ env.SERVICE_NAME }}:${{ github.sha }} ${{ env.REGISTRY }}/hewawasamdm/${{ env.SERVICE_NAME }}:latest
        docker push ${{ env.REGISTRY }}/hewawasamdm/${{ env.SERVICE_NAME }}:${{ github.sha }}
        docker push ${{ env.REGISTRY }}/hewawasamdm/${{ env.SERVICE_NAME }}:latest
        docker rmi ${{ env.REGISTRY }}/hewawasamdm/${{ env.SERVICE_NAME }}:${{ github.sha }} ${{ env.REGISTRY }}/hewawasamdm/${{ env.SERVICE_NAME }}:latest

    - name: Blue-Green Deployment
      run: |
        CURRENT=$(kubectl get deployment frontend-deployment -o jsonpath='{.metadata.labels.color}' 2>/dev/null || echo "blue")
        [ "$CURRENT" == "blue" ] && IDLE="green" || IDLE="blue"
        cat << EOF > /tmp/frontend-${IDLE}.yaml
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: frontend-${IDLE}
          labels:
            app: frontend
            color: ${IDLE}
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: frontend
              color: ${IDLE}
          template:
            metadata:
              labels:
                app: frontend
                color: ${IDLE}
            spec:
              containers:
              - name: frontend
                image: ${{ env.REGISTRY }}/hewawasamdm/frontend:${{ github.sha }}
                ports:
                - containerPort: 80
                resources:
                  requests:
                    memory: "32Mi"
                    cpu: "25m"
                  limits:
                    memory: "64Mi"
                    cpu: "50m"
                readinessProbe:
                  httpGet:
                    path: /
                    port: 80
                  initialDelaySeconds: 5
                  periodSeconds: 5
        EOF
        kubectl apply -f /tmp/frontend-${IDLE}.yaml
        kubectl rollout status deployment/frontend-${IDLE} --timeout=120s
        sleep 10
        kubectl patch service frontend-service -p "{\"spec\":{\"selector\":{\"app\":\"frontend\",\"color\":\"${IDLE}\"}}}" 2>/dev/null || \
        kubectl expose deployment frontend-${IDLE} --name=frontend-service --port=80 --target-port=80 --type=LoadBalancer
        kubectl scale deployment frontend-${CURRENT} --replicas=0 2>/dev/null
